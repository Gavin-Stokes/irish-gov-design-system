<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #fff; padding: 24px; }
  .row { display: flex; gap: 32px; flex-wrap: wrap; align-items: center; }
  .variant { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .bg-dark { background: #004D44; padding: 20px 28px; border-radius: 8px; }
  .bg-light { background: #EAF4F5; padding: 20px 28px; border-radius: 8px; }
  .bg-white { background: #fff; padding: 20px 28px; border-radius: 8px; border: 1px solid #e0e0e0; }
  .label { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }

  .harp-lockup { display: flex; align-items: center; gap: 10px; }
  .harp-icon svg { display: block; }
  .harp-divider { width: 1px; background: currentColor; opacity: 0.4; }
  .harp-wordmark { font-family: 'Lato', sans-serif; font-size: 11px; line-height: 1.4; }
  .overline-tag {
    font-family: 'Lato', sans-serif; font-size: 10px; letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
  <div class="row">
    <!-- White on dark green -->
    <div class="variant">
      <div class="bg-dark">
        <div class="harp-lockup">
          <div class="harp-icon">
            <svg width="28" height="44" viewBox="0 0 28 44" fill="none">
              <rect x="0" y="0" width="1.5" height="44" fill="white"/>
              <path d="M7 3 C7 3 22 9 22 22 C22 35 7 41 7 41" stroke="white" stroke-width="2.5" fill="none"/>
              <path d="M9 7 C9 7 19 12 19 22 C19 32 9 37 9 37" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
              <line x1="5" y1="9"  x2="22" y2="9"  stroke="white" stroke-width="1.1" opacity="0.5"/>
              <line x1="4" y1="15" x2="22" y2="15" stroke="white" stroke-width="1.1" opacity="0.5"/>
              <line x1="4" y1="22" x2="22" y2="22" stroke="white" stroke-width="1.1" opacity="0.5"/>
              <line x1="4" y1="29" x2="21" y2="29" stroke="white" stroke-width="1.1" opacity="0.5"/>
              <line x1="5" y1="35" x2="20" y2="35" stroke="white" stroke-width="1.1" opacity="0.5"/>
            </svg>
          </div>
          <div class="harp-divider" style="height:44px;color:white"></div>
          <div class="harp-wordmark" style="color:white">Gov.ie<br/>Digital Services</div>
        </div>
      </div>
      <div class="label">White on deep green</div>
    </div>

    <!-- Harp only small -->
    <div class="variant">
      <div class="bg-dark" style="padding:16px">
        <svg width="20" height="32" viewBox="0 0 28 44" fill="none">
          <rect x="0" y="0" width="1.5" height="44" fill="white"/>
          <path d="M7 3 C7 3 22 9 22 22 C22 35 7 41 7 41" stroke="white" stroke-width="2.5" fill="none"/>
          <line x1="5" y1="9"  x2="22" y2="9"  stroke="white" stroke-width="1.1" opacity="0.5"/>
          <line x1="4" y1="15" x2="22" y2="15" stroke="white" stroke-width="1.1" opacity="0.5"/>
          <line x1="4" y1="22" x2="22" y2="22" stroke="white" stroke-width="1.1" opacity="0.5"/>
          <line x1="4" y1="29" x2="21" y2="29" stroke="white" stroke-width="1.1" opacity="0.5"/>
          <line x1="5" y1="35" x2="20" y2="35" stroke="white" stroke-width="1.1" opacity="0.5"/>
        </svg>
      </div>
      <div class="label">Harp only (nav icon)</div>
    </div>

    <!-- Yellow harp on dark -->
    <div class="variant">
      <div class="bg-dark">
        <div class="harp-lockup">
          <svg width="28" height="44" viewBox="0 0 28 44" fill="none">
            <rect x="0" y="0" width="1.5" height="44" fill="#E3DE83"/>
            <path d="M7 3 C7 3 22 9 22 22 C22 35 7 41 7 41" stroke="#E3DE83" stroke-width="2.5" fill="none"/>
            <line x1="5" y1="9"  x2="22" y2="9"  stroke="#E3DE83" stroke-width="1.1" opacity="0.6"/>
            <line x1="4" y1="15" x2="22" y2="15" stroke="#E3DE83" stroke-width="1.1" opacity="0.6"/>
            <line x1="4" y1="22" x2="22" y2="22" stroke="#E3DE83" stroke-width="1.1" opacity="0.6"/>
            <line x1="4" y1="29" x2="21" y2="29" stroke="#E3DE83" stroke-width="1.1" opacity="0.6"/>
            <line x1="5" y1="35" x2="20" y2="35" stroke="#E3DE83" stroke-width="1.1" opacity="0.6"/>
          </svg>
          <div style="width:1px;height:44px;background:#E3DE83;opacity:0.4;"></div>
          <div class="harp-wordmark" style="color:#E3DE83">Gov.ie<br/>Digital Services</div>
        </div>
      </div>
      <div class="label">Yellow accent variant</div>
    </div>

    <!-- On light bg -->
    <div class="variant">
      <div class="bg-light">
        <div class="harp-lockup">
          <svg width="28" height="44" viewBox="0 0 28 44" fill="none">
            <rect x="0" y="0" width="1.5" height="44" fill="#004D44"/>
            <path d="M7 3 C7 3 22 9 22 22 C22 35 7 41 7 41" stroke="#004D44" stroke-width="2.5" fill="none"/>
            <line x1="5" y1="9"  x2="22" y2="9"  stroke="#004D44" stroke-width="1.1" opacity="0.5"/>
            <line x1="4" y1="15" x2="22" y2="15" stroke="#004D44" stroke-width="1.1" opacity="0.5"/>
            <line x1="4" y1="22" x2="22" y2="22" stroke="#004D44" stroke-width="1.1" opacity="0.5"/>
            <line x1="4" y1="29" x2="21" y2="29" stroke="#004D44" stroke-width="1.1" opacity="0.5"/>
          </svg>
          <div style="width:1px;height:44px;background:#004D44;opacity:0.3;"></div>
          <div class="harp-wordmark" style="color:#004D44">Gov.ie<br/>Digital Services</div>
        </div>
      </div>
      <div class="label">On light teal bg</div>
    </div>
  </div>

  <div style="margin-top:20px;padding:12px 16px;background:#F5F5F5;border-radius:6px">
    <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">Overline / Sub-brand</div>
    <div class="overline-tag" style="background:#004D44;display:inline-block;padding:4px 10px;border-radius:3px;font-size:10px">DPENDR — LIFE EVENTS</div>
    <span style="font-size:12px;color:#aaa;margin-left:12px">Used below logo on cover pages, letter-spacing: 3px, opacity 0.5</span>
  </div>
</body>
</html>
