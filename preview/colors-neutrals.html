<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #fff; padding: 16px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .block { width: 72px; height: 52px; border-radius: 4px; }
  .label { font-size: 10px; color: #505A5F; font-weight: 700; }
  .hex   { font-size: 10px; color: #888; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="block" style="background:#0B0C0C"></div><div class="label">900 Text</div><div class="hex">#0B0C0C</div></div>
    <div class="swatch"><div class="block" style="background:#263238"></div><div class="label">850 Slate</div><div class="hex">#263238</div></div>
    <div class="swatch"><div class="block" style="background:#262626"></div><div class="label">800 Dark</div><div class="hex">#262626</div></div>
    <div class="swatch"><div class="block" style="background:#455A64"></div><div class="label">700 Slate</div><div class="hex">#455A64</div></div>
    <div class="swatch"><div class="block" style="background:#585858"></div><div class="label">600 Grey</div><div class="hex">#585858</div></div>
    <div class="swatch"><div class="block" style="background:#505A5F"></div><div class="label">550 Support</div><div class="hex">#505A5F</div></div>
    <div class="swatch"><div class="block" style="background:#888888"></div><div class="label">500 Border</div><div class="hex">#888888</div></div>
    <div class="swatch"><div class="block" style="background:#CCCCCC"></div><div class="label">300 Divider</div><div class="hex">#CCCCCC</div></div>
    <div class="swatch"><div class="block" style="background:#E0E0E0"></div><div class="label">200 Light</div><div class="hex">#E0E0E0</div></div>
    <div class="swatch"><div class="block" style="background:#F0F0F0; border:1px solid #e0e0e0"></div><div class="label">100 Card</div><div class="hex">#F0F0F0</div></div>
    <div class="swatch"><div class="block" style="background:#F2F2F2; border:1px solid #e0e0e0"></div><div class="label">75 Page BG</div><div class="hex">#F2F2F2</div></div>
    <div class="swatch"><div class="block" style="background:#FAFAFA; border:1px solid #e0e0e0"></div><div class="label">50 Near-Wh</div><div class="hex">#FAFAFA</div></div>
    <div class="swatch"><div class="block" style="background:#FFFFFF; border:1px solid #e0e0e0"></div><div class="label">White</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
