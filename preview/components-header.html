<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #F2F2F2; padding: 0; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; padding: 12px 16px 6px; }

  /* Standard header (form/detail screens) */
  .header-standard {
    background: #008660; width: 100%;
    display: flex; flex-direction: column;
  }
  .status-bar { height: 24px; background: #008660; }
  .nav-bar {
    height: 67.5px; background: #008660;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px;
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .harp-mark { display: flex; align-items: center; gap: 4px; }
  .harp-svg { width: 28px; height: 44px; }
  .harp-rule { width: 1px; height: 44px; background: rgba(255,255,255,0.5); }
  .gov-text { font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.3; max-width: 80px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .username { color: #fff; font-size: 15px; }
  .icon-btn { color: #fff; background: rgba(255,255,255,0.1); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .accent-strip { height: 8px; background: #008660; }

  /* Hero header (home screen) */
  .header-hero {
    background: #004D44; width: 100%; position: relative; overflow: hidden;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: url('../assets/hero-overlay.png') center/cover no-repeat;
    opacity: 0.8; mix-blend-mode: overlay;
  }
  .hero-content {
    position: relative; padding: 0 16px 20px; padding-top: 0;
  }
  .hero-greeting { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.3; margin-top: 12px; }
  .hero-sub { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.85); line-height: 1.5; margin-top: 8px; }
</style>
</head>
<body>
  <div class="section-label">Standard Header (Form / Detail Screens)</div>
  <div class="header-standard">
    <div class="status-bar"></div>
    <div class="nav-bar">
      <div class="nav-left">
        <div class="icon-btn"><span class="material-icons" style="font-size:20px">menu</span></div>
        <div class="harp-mark">
          <svg class="harp-svg" viewBox="0 0 28 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="0" width="1" height="44" fill="white" opacity="0.5"/>
            <path d="M8 4 C8 4 20 8 20 22 C20 36 8 40 8 40" stroke="white" stroke-width="2.5" fill="none"/>
            <path d="M10 8 C10 8 18 12 18 22 C18 32 10 36 10 36" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
            <path d="M6 10 L20 10" stroke="white" stroke-width="1.2" opacity="0.4"/>
            <path d="M5 16 L20 16" stroke="white" stroke-width="1.2" opacity="0.4"/>
            <path d="M5 22 L20 22" stroke="white" stroke-width="1.2" opacity="0.4"/>
            <path d="M6 28 L20 28" stroke="white" stroke-width="1.2" opacity="0.4"/>
            <path d="M8 34 L19 34" stroke="white" stroke-width="1.2" opacity="0.4"/>
          </svg>
          <div class="harp-rule"></div>
          <div class="gov-text">Gov.ie<br/>Digital Services</div>
        </div>
      </div>
      <div class="nav-right">
        <span class="username">David</span>
        <div class="icon-btn"><span class="material-icons" style="font-size:20px">account_circle</span></div>
      </div>
    </div>
    <div class="accent-strip"></div>
  </div>

  <div class="section-label" style="margin-top:8px">Hero Header (Home / Dashboard)</div>
  <div class="header-hero">
    <div class="hero-overlay"></div>
    <div class="header-standard" style="background:transparent">
      <div class="status-bar" style="background:transparent"></div>
      <div class="nav-bar" style="background:transparent">
        <div class="nav-left">
          <div class="icon-btn"><span class="material-icons" style="font-size:20px">notifications</span></div>
          <div class="harp-mark">
            <svg class="harp-svg" viewBox="0 0 28 44" fill="none">
              <rect x="1" y="0" width="1" height="44" fill="white" opacity="0.5"/>
              <path d="M8 4 C8 4 20 8 20 22 C20 36 8 40 8 40" stroke="white" stroke-width="2.5" fill="none"/>
              <path d="M6 10 L20 10" stroke="white" stroke-width="1.2" opacity="0.4"/>
              <path d="M5 16 L20 16" stroke="white" stroke-width="1.2" opacity="0.4"/>
              <path d="M5 22 L20 22" stroke="white" stroke-width="1.2" opacity="0.4"/>
              <path d="M6 28 L20 28" stroke="white" stroke-width="1.2" opacity="0.4"/>
            </svg>
          </div>
        </div>
        <div class="nav-right">
          <span class="username">David</span>
          <div class="icon-btn"><span class="material-icons" style="font-size:20px">account_circle</span></div>
        </div>
      </div>
    </div>
    <div class="hero-content">
      <div class="hero-greeting">Good Morning David</div>
      <div class="hero-sub">Welcome back to your one stop shop<br>for public services in Ireland</div>
    </div>
  </div>
</body>
</html>
